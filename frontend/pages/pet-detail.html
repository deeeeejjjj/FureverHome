<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pet Detail — Furever Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="../css/pet-detail.css"/>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top fh-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
      <div class="brand-icon"><i class="bi bi-heart-fill"></i></div>
      <span class="brand-text">Furever<span class="brand-accent">Home</span></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="pets.html">Find a Pet</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
        <li class="nav-item"><a class="nav-link" href="tips.html">Pet Care Tips</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <a href="login.html" class="btn btn-outline-primary btn-sm px-3">Log In</a>
        <a href="register.html" class="btn btn-primary btn-sm px-3">Sign Up</a>
      </div>
    </div>
  </div>
</nav>

<div class="container py-5">
  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="../index.html" class="text-muted">Home</a></li>
      <li class="breadcrumb-item"><a href="pets.html" class="text-muted">Find a Pet</a></li>
      <li class="breadcrumb-item active" id="breadcrumb-name">Pet Detail</li>
    </ol>
  </nav>

  <div class="row g-5">
    <!-- Left: Images -->
    <div class="col-lg-6">
      <div class="pet-detail-img-main mb-3">
        <img src="" alt="" id="mainImg" class="w-100"/>
        <span id="statusBadge" class="pet-status detail-badge">Loading…</span>
        <button class="fav-btn detail-fav" onclick="toggleFav(this)"><i class="bi bi-heart"></i></button>
      </div>
      <div class="pet-thumbs d-flex gap-2" id="thumbsContainer">
        <!-- Thumbnails injected by JS -->
      </div>
    </div>

    <!-- Right: Details -->
    <div class="col-lg-6">
      <div class="detail-type mb-2" id="petType"></div>
      <h1 class="detail-name" id="petName"></h1>
      <div class="detail-location mb-4" id="petLocation"></div>

      <!-- Stats grid -->
      <div class="row g-2 mb-4">
        <div class="col-6 col-sm-3">
          <div class="detail-stat"><div class="ds-label">Breed</div><div class="ds-val" id="statBreed">—</div></div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="detail-stat"><div class="ds-label">Age</div><div class="ds-val" id="statAge">—</div></div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="detail-stat"><div class="ds-label">Gender</div><div class="ds-val" id="statGender">—</div></div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="detail-stat"><div class="ds-label">Size</div><div class="ds-val" id="statSize">—</div></div>
        </div>
      </div>

      <!-- Health / tag badges -->
      <div class="health-tags mb-4" id="healthTags">
        <!-- Injected by JS -->
      </div>

      <!-- About -->
      <h5 class="fw-700 mb-2" id="aboutHeading">About</h5>
      <p class="text-muted mb-4" id="petDesc" style="font-size:14px;line-height:1.8"></p>

      <!-- Owner info -->
      <div class="owner-card mb-4">
        <div class="owner-avatar"><i class="bi bi-building-fill-heart"></i></div>
        <div>
          <div class="owner-name" id="shelterName">Animal Shelter</div>
          <div class="owner-role">Official Rescue Partner</div>
        </div>
        <a href="contact.html" class="btn btn-sm btn-outline-dark ms-auto">Contact</a>
      </div>

      <!-- Actions -->
      <div class="d-flex gap-3 flex-wrap">
        <a id="adoptBtn" href="#" class="btn btn-gold btn-lg flex-fill">Adopt <i class="bi bi-arrow-right ms-1"></i></a>
        <button class="btn btn-outline-dark btn-lg" onclick="toggleFav(this)"><i class="bi bi-heart me-1"></i>Save</button>
      </div>
    </div>
  </div>
</div>

<footer class="fh-footer mt-5">
  <div class="container">
    <div class="footer-bottom"><p>© 2026 Furever Home. All rights reserved.</p></div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/pet-detail.js"></script>
</body>
</html>
